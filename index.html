<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CGPA Calculator</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
<nav style="text-align:center; margin-bottom:20px;">
  <a href="index.html">Home</a> |
  <a href="about.html">About</a> |
  <a href="privacy.html">Privacy</a> |
  <a href="contact.html">Contact</a>
</nav>
<div class="container">
  <h1>CGPA Calculator</h1>

  <div id="courses"></div>

  <button onclick="addCourse()">+ Add Course</button>
  <button onclick="calculateCGPA()">Calculate CGPA</button>

  <div class="result" id="cgpaResult"></div>

  <!-- Target CGPA -->
  <div class="section">
    <h2>Target CGPA Planner</h2>

    <input id="currentCGPA" placeholder="Current CGPA">
    <input id="completedCredits" placeholder="Completed Credits">
    <input id="targetCGPA" placeholder="Target CGPA">
    <input id="remainingCredits" placeholder="Remaining Credits">

    <button onclick="calculateTarget()">Calculate Required GPA</button>

    <div class="result" id="targetResult"></div>
  </div>
</div>

<script src="script.js"></script>
</body>
</html>
